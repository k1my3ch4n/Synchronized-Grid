services:
  postgres:
    image: postgres:16-alpine
    container_name: syngrid-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: syngrid
      POSTGRES_PASSWORD: syngrid_dev
      POSTGRES_DB: syngrid
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
